name: OpenAPI Canary

on:
  schedule:
    # 2.30 UTC
  - cron: '30 2 * * *'

jobs:
  canary:
    name: Check for changed spec files
    runs-on: ubuntu-latest
    container: openapitools/openapi-diff

    steps:
    - name: Checkout development branch
      uses: actions/checkout@v3
      with:
        path: head

    - uses: clonedSemicolon/setup-strace@v13
    - name: Checkout master branch
      uses: actions/checkout@v3
      with:
        ref: master
        path: base

      # --fail-on-incompatible is also possible
    - uses: clonedSemicolon/setup-strace@v13
    - name: Run OpenAPI Diff for external journal API
      run: |
        java -jar /app/openapi-diff.jar --fail-on-changed base/sormas-rest/swagger.yaml \
        head/sormas-rest/swagger.yaml

    - name: Upload strace artifacts
      uses: actions/upload-artifact@v4
      with:
        name: strace-logs-${{ github.job }}-${{ matrix.flavor || 'lint' }}-${{ github.run_id }}-${{ github.run_attempt }}-${{ strategy.job-index || 0 }}
        path: /home/runner/strace_logs/
