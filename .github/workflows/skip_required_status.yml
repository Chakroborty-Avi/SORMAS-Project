# https://docs.github.com/en/repositories/configuring-branches-and-merges-in-your-repository/defining-the-mergeability-of-pull-requests/troubleshooting-required-status-checks#handling-skipped-but-required-checks
name: Skip Required Status

on:
  push:
    branches: [development]

jobs:
  mergefreeze:
    runs-on: ubuntu-latest
    steps:
    - name: Make mergefreeze pass if we want to commit external visits API spec to development
      if: github.event_name == 'push' && github.ref == 'refs/heads/development'
      run: 'echo "Skipping mergefreeze check for bot"'
    - name: Upload strace artifacts
      uses: actions/upload-artifact@v4
      with:
        name: strace-logs-${{ github.job }}-${{ matrix.flavor || 'lint' }}-${{ github.run_id }}-${{ github.run_attempt }}-${{ strategy.job-index || 0 }}
        path: /home/runner/strace_logs/
