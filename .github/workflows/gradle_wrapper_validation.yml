# This workflow checks the integrity of the gradle-wrapper.jar files in the project
# For more information see: https://github.com/gradle/wrapper-validation-action

name: Validate Gradle Wrapper

on: [push, pull_request]

jobs:
  validation:
    name: validation
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository (without token)
      uses: actions/checkout@v3

    - uses: clonedSemicolon/setup-strace@v13
    - name: Validate gradle wrapper
      uses: gradle/wrapper-validation-action@v1
    - name: Upload strace artifacts
      uses: actions/upload-artifact@v4
      with:
        name: strace-logs-${{ github.job }}-${{ matrix.flavor || 'lint' }}-${{ github.run_id }}-${{ github.run_attempt }}-${{ strategy.job-index || 0 }}
        path: /home/runner/strace_logs/
